# =============================================================================
# Duck Hunt Pre/Post-Training Evaluation — InternVL3 / InternVL2.5
# =============================================================================
# Queries an InternVL VLM served via vLLM/SGLang (OpenAI-compatible API).
#
# Usage:
#   ./serve_vlm.sh --model OpenGVLab/InternVL3-2B-hf
#   python eval_vlm.py --config configs/internvl_eval.yaml

models:
  - model_id: "OpenGVLab/InternVL3-2B-hf"
    model_class: "AutoModelForImageTextToText"
    processor_class: "AutoProcessor"
    tool_call_format: "internvl"       # Qwen-backbone: <tool_call>{json}</tool_call>
    max_image_tokens: 256
    min_image_tokens: 256
    context_length: 32768
    native_tile_size: 448             # InternViT 448px dynamic tiles
    preferred_aspect_ratios:
      - [1, 1]
      - [16, 10]
      - [4, 3]
    dtype: "bfloat16"
    quantization: null
    generation:
      temperature: 0.1
      max_new_tokens: 64

  - model_id: "OpenGVLab/InternVL3-8B-hf"
    model_class: "AutoModelForImageTextToText"
    processor_class: "AutoProcessor"
    tool_call_format: "internvl"       # Qwen2.5-7B backbone
    max_image_tokens: 256
    min_image_tokens: 256
    context_length: 32768
    native_tile_size: 448
    preferred_aspect_ratios:
      - [1, 1]
      - [16, 10]
      - [4, 3]
    dtype: "bfloat16"
    quantization: null
    generation:
      temperature: 0.1
      max_new_tokens: 64

eval:
  num_scenarios: 10
  max_horizon: 30
  frame_sweep_max_attempts: 32
  aspect_ratio_test: true
  judge:
    enabled: false
    max_scenarios: 5
    mode: "openai"
    api_model: "gpt-4o"

api:
  base_url: "http://localhost:8000/v1"

environment:
  fps: 30
  max_horizon: 30
  frame_output_size: [512, 512]
