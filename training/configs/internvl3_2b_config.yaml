# =============================================================================
# Duck Hunt GRPO Training — InternVL3-2B (Qwen2.5 backbone, LoRA)
# =============================================================================
# OpenGVLab/InternVL3-2B-hf: ~2.1B params (InternViT-300M + Qwen2.5-1.5B).
# Use the "-hf" checkpoint — loads natively via AutoModelForImageTextToText
# (transformers >= 4.52, NO trust_remote_code). The bare "OpenGVLab/InternVL3-2B"
# original checkpoint needs trust_remote_code and a different (model.chat) API.
# VRAM: bf16 ~5-6GB; 4-bit ~2.5-3GB.
#
# Tool calling is NOT in the chat template — the InternVLFormat injects the tool
# schema into the system prompt. Qwen2.5 backbone emits Hermes-style:
#     <tool_call>{"name": "shoot", "arguments": {"x": .., "y": .., "horizon": ..}}</tool_call>
#
# Usage:
#   python train.py --config configs/internvl3_2b_config.yaml --custom \
#       --override training.max_steps=20000 \
#       --override grpo.curriculum_phase2_step=12000

model:
  model_name: "OpenGVLab/InternVL3-2B-hf"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"   # InternVL supports FA2; "sdpa"/"eager" also work
  trust_remote_code: false                   # native path with the -hf checkpoint
  device_map: "auto"
  quantization: null                         # set "4bit" for QLoRA (~2.5-3GB)

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  target_modules:                            # Qwen2.5 backbone (language model only)
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  bias: "none"

grpo:
  num_generations: 6
  max_completion_length: 60                   # JSON <tool_call> is longer than pythonic
  temperature: 1.0
  top_p: 0.95
  top_k: 0
  beta: 0.0
  num_iterations: 1
  epsilon: 0.2
  loss_type: "grpo"
  scale_rewards: "group"
  entropy_coeff: 0.0
  entropy_floor: 0.0
  entropy_floor_coeff: 0.0
  curriculum_phase2_step: 12000
  phase1_max_completion_length: 50
  stabilization_steps: 0
  stabilization_grad_accum: 8
  lora_freeze_steps: 0
  use_vllm: false

training:
  output_dir: "./outputs/internvl3_2b_duckhunt_grpo"
  num_train_epochs: 3
  max_steps: -1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  logging_steps: 1
  save_steps: 500
  save_total_limit: 3
  eval_strategy: "no"
  eval_steps: 100
  seed: 42
  dataloader_num_workers: 4
  gradient_checkpointing: true

environment:
  # InternVL3-2B single-generation latency ~0.3-0.7s on a good GPU.
  latency_options_ms: [100, 150, 200, 300, 400]
  frames_per_observation: 2
  frames_per_observation_min: 2
  frames_per_observation_max: 4
  frame_skip: 6

reward:
  hit: 1.0
  double_kill: 2.5
  miss: -0.1
  shoot_nothing: -0.5
  lambda_horizon: 0.1
  proximity_bonus: 1.0
  proximity_decay: 3.0
  edge_bonus: 0.3
  hitbox_center_bonus: 0.5
  hotspot_enabled: true
  skip_invalid_generations: false
  format_weight: 0.3
  accuracy_weight: 1.0
  reward_normalization: "group"

logging:
  wandb_project: "duckhunt-grpo"
  wandb_run_name: "internvl3-2b-grpo-v1"
  report_to: "wandb"
  log_completions: true
  num_completions_to_print: 5
